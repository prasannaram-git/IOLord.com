<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://dashkill-io.onrender.com">
    <title>DashKill.io — Redirecting...</title>
    <meta name="description" content="DashKill.io — 10-Level Tournament Arena. Redirecting to game...">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a12;
            color: #e8e8f0;
            font-family: 'Orbitron', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
            gap: 20px;
        }

        .title {
            font-size: 32px;
            font-weight: 900;
            color: #00ff88;
            letter-spacing: 0.06em;
        }

        .title span {
            color: #ff00aa;
        }

        .msg {
            font-size: 14px;
            color: #6666aa;
            letter-spacing: 0.15em;
        }

        .dot {
            display: inline-block;
            animation: blink 1s step-end infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0
            }

            50% {
                opacity: 1
            }
        }

        a {
            color: #00fff2;
            margin-top: 12px;
            font-size: 13px;
            letter-spacing: 0.1em;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="title">DASH<span>KILL</span><span style="color:#00fff2;font-size:18px;vertical-align:super">.io</span>
    </div>
    <div class="msg">LAUNCHING GAME<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
    <a href="https://dashkill-io.onrender.com">Click here if not redirected automatically</a>
    <script>window.location.replace('https://dashkill-io.onrender.com');</script>
</body>

</html>
